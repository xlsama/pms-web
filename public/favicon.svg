  <path d="M84 52H101M84 69H101" stroke="#B9F9FF" stroke-width="5" stroke-linecap="round" opacity="0.42"/>
  <path
    d="M31 94V33H66C82 33 93 43 93 58C93 73 82 83 66 83H50V94H31ZM50 66H64C70 66 74 63 74 58C74 53 70 50 64 50H50V66Z"
